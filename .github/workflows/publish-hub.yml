name: Publish Hub (uamkt.com via Netlify)

on:
  push:
    branches: [main]
    paths:
      - 'src/content/articles/**'
      - 'src/pages/**'
      - 'src/layouts/**'
      - 'src/components/**'
      - 'src/lib/**'
      - 'src/styles/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Astro + Deploy to Netlify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          production-branch: main
          deploy-message: "Auto-deploy from GitHub Actions: ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

      - name: Notify completion
        if: success()
        run: |
          echo "✅ Hub published successfully to https://uamkt.com"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
