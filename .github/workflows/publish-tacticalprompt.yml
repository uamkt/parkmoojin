name: Publish to TacticalPrompt-v2 (Vercel via cross-repo push)

on:
  push:
    branches: [main]
    paths:
      - '_content_pipeline/**/tacticalprompt.mdx'
  workflow_dispatch:
    inputs:
      content_path:
        description: 'Content file path (e.g., _content_pipeline/2026-04-30/tacticalprompt.mdx)'
        required: true
        type: string

jobs:
  publish-tacticalprompt:
    name: Cross-repo push to tacticalprompt-v2
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout uamkt-com (source)
        uses: actions/checkout@v4
        with:
          path: uamkt-com
          fetch-depth: 2

      - name: Detect changed tacticalprompt.mdx files
        id: detect
        run: |
          cd uamkt-com
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "files=${{ github.event.inputs.content_path }}" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD^ HEAD | grep -E '_content_pipeline/.*/tacticalprompt\.mdx$' | tr '\n' ' ')
            echo "files=$CHANGED" >> $GITHUB_OUTPUT
          fi
          if [ -z "$(echo $CHANGED | xargs)" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "ℹ️ No tacticalprompt.mdx changes detected — exiting."
          fi

      - name: Checkout tacticalprompt-v2 (target)
        if: steps.detect.outputs.files != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.TP2_REPO_OWNER }}/${{ secrets.TP2_REPO_NAME }}
          token: ${{ secrets.TP2_REPO_PAT }}
          path: tacticalprompt-v2
          ref: main

      - name: Copy + commit + push
        if: steps.detect.outputs.files != ''
        run: |
          set -euo pipefail
          cd tacticalprompt-v2
          mkdir -p apps/web/content/insights/

          for FILE in ${{ steps.detect.outputs.files }}; do
            DATE=$(echo "$FILE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
            [ -z "$DATE" ] && DATE=$(date -u +%Y-%m-%d)

            # frontmatter에서 slug 추출 (없으면 파일명)
            SLUG=$(grep -m1 -E '^slug:' "../uamkt-com/$FILE" | sed -E 's/^slug:[[:space:]]*"?([^"]+)"?/\1/' || echo "")
            if [ -z "$SLUG" ]; then
              BASE=$(basename "$FILE" .mdx)
              SLUG="$BASE"
            fi

            DEST="apps/web/content/insights/${DATE}-${SLUG}.mdx"
            cp "../uamkt-com/$FILE" "$DEST"
            echo "📝 Copied $FILE → $DEST"
          done

          git config user.name "OSMU Auto-Publisher"
          git config user.email "ceo@uamkt.com"
          git add apps/web/content/insights/

          if git diff --cached --quiet; then
            echo "ℹ️ No content delta — skipping commit."
            exit 0
          fi

          COMMIT_MSG="feat(content): OSMU cycle ${{ github.run_id }} — tacticalprompt insight from uamkt-com (commit ${{ github.sha }})"
          git commit -m "$COMMIT_MSG"
          git push origin main
          echo "✅ Pushed to tacticalprompt-v2 → Vercel auto-deploy will trigger in ~60s"

      - name: Notify completion
        if: success() && steps.detect.outputs.files != ''
        run: |
          echo "🎉 TacticalPrompt-v2 cross-repo publish completed."
          echo "   Source: uamkt-com commit ${{ github.sha }}"
          echo "   Target: ${{ secrets.TP2_REPO_OWNER }}/${{ secrets.TP2_REPO_NAME }}@main"
          echo "   Vercel should redeploy automatically in 60~120s."
